<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago fallido — Nomi Pizza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF8F5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 32px;text-align:center;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.icon{width:72px;height:72px;background:#FAECE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
h1{font-family:'Playfair Display',serif;font-size:26px;color:#1A1714;margin-bottom:8px}
p{font-size:15px;color:#6B6460;line-height:1.6;margin-bottom:24px}
.btn{display:block;padding:14px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:10px}
.btn-primary{background:#C8392B;color:#fff}
.btn-secondary{background:#F0EDE8;color:#1A1714}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>Pago no procesado</h1>
  <p>Hubo un problema al procesar tu pago. Tu pedido no ha sido confirmado. Por favor intenta de nuevo.</p>
  <a href="javascript:history.back()" class="btn btn-primary">🔄 Intentar de nuevo</a>
  <a href="nomi-customer-app.html" class="btn btn-secondary">← Volver al menú</a>
</div>
</body>
</html>
