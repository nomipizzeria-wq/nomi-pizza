<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#111;color:#fff;min-height:100vh;font-size:14px}
.hdr{background:#000;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #C8392B}
.brand{display:flex;align-items:center;gap:10px}
.title{font-size:15px;font-weight:700}.sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.stats{display:flex;gap:18px;align-items:center}
.stat{text-align:center}.stat-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}.stat-lbl{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.cols{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#222;min-height:calc(100vh - 58px)}
.col{background:#1a1a1a;display:flex;flex-direction:column}
.col-hdr{padding:10px 12px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between}
.col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35)}
.col-cnt{font-size:11px;font-weight:700;color:rgba(255,255,255,.5)}
.orders{padding:8px;flex:1;overflow-y:auto}
.oc{background:#242424;border-radius:10px;margin-bottom:8px;overflow:hidden;border-left:4px solid transparent}
.oc.cn{border-left-color:#C8392B;animation:np 1s 3}
.oc.cp{border-left-color:#B45309}
.oc.ca{border-left-color:#22c55e}
.oc.cu{border-left-color:#EF4444;animation:up 2s infinite}
.oc.cd{border-left-color:#444;opacity:.6}
@keyframes np{0%,100%{background:#242424}50%{background:#2d1a1a}}
@keyframes up{0%,100%{background:#242424}50%{background:#2d1a1a}}
.och{padding:9px 11px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between}
.onum{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4)}
.otbl{font-size:14px;font-weight:700}
.oty{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;text-transform:uppercase}
.td{background:rgba(200,57,43,.2);color:#ff9080}.tde{background:rgba(29,78,216,.2);color:#7eb3ff}.tp{background:rgba(45,122,79,.2);color:#7dcca0}
.otm{font-family:'DM Mono',monospace;font-size:12px;font-weight:700}
.tmok{color:#22c55e}.tmw{color:#B45309}.tmc{color:#EF4444}
.ois{padding:8px 11px}
.oi{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid #2d2d2d;cursor:pointer}
.oi:last-child{border-bottom:none}.oi.dk{opacity:.3}
.oichk{width:17px;height:17px;border-radius:4px;border:2px solid #444;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.oi.dk .oichk{background:#22c55e;border-color:#22c55e}
.oick-i{display:none;color:#fff;font-size:10px;font-weight:700}
.oi.dk .oick-i{display:block}
.oic{flex:1}.oin{font-size:12px;font-weight:600}.oiq{font-size:11px;color:rgba(255,255,255,.4);margin-right:5px}
.onte{font-size:10px;color:#B45309;margin-top:2px;font-weight:600}
.oact{padding:7px 11px;border-top:1px solid #333;display:flex;gap:5px}
.obtn{flex:1;padding:6px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.oba{background:#C8392B;color:#fff}.obb{background:#333;color:rgba(255,255,255,.5)}
.sbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:10px;color:rgba(255,255,255,.5)}
.ktoast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#fff;color:#1A1714;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:99;white-space:nowrap}
.ktoast.show{transform:translateX(-50%) translateY(0);opacity:1}
.empty-col{display:flex;align-items:center;justify-content:center;height:100px;color:rgba(255,255,255,.2);font-size:12px}
</style>

<body>
<!-- PIN LOGIN SCREEN — injected at top of each staff app -->
<style>
.pin-screen{position:fixed;inset:0;background:var(--ink,#1A1714);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;font-family:'DM Sans',sans-serif}
.pin-logo{font-size:48px;margin-bottom:8px}
.pin-brand{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.pin-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:40px;text-transform:uppercase;letter-spacing:.1em}
.pin-label{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:all .2s}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.15)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:260px}
.pin-key{height:70px;border-radius:14px;border:none;background:rgba(255,255,255,.08);color:#fff;font-family:'DM Sans',sans-serif;font-size:22px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent}
.pin-key:hover{background:rgba(255,255,255,.14)}
.pin-key:active{background:rgba(255,255,255,.22);transform:scale(.94)}
.pin-key.del{font-size:18px;color:rgba(255,255,255,.6)}
.pin-key.empty{background:transparent;cursor:default;pointer-events:none}
.pin-key-sub{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.1em;margin-top:2px}
.pin-error{color:#EF4444;font-size:12px;margin-bottom:16px;min-height:18px;text-align:center}
.pin-loading{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:16px;display:none}
.pin-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.pin-worker-info{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,.2);font-size:11px}
</style>

<div class="pin-screen" id="pin-screen">
  <div class="pin-logo">🍕</div>
  <div class="pin-brand">Nomi Pizza</div>
  <div class="pin-sub" id="pin-role-label">COCINA ACCESS</div>
  <div class="pin-label">Ingresa tu PIN de 4 dígitos</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinKey('1')">1<span class="pin-key-sub"></span></button>
    <button class="pin-key" onclick="pinKey('2')">2<span class="pin-key-sub">ABC</span></button>
    <button class="pin-key" onclick="pinKey('3')">3<span class="pin-key-sub">DEF</span></button>
    <button class="pin-key" onclick="pinKey('4')">4<span class="pin-key-sub">GHI</span></button>
    <button class="pin-key" onclick="pinKey('5')">5<span class="pin-key-sub">JKL</span></button>
    <button class="pin-key" onclick="pinKey('6')">6<span class="pin-key-sub">MNO</span></button>
    <button class="pin-key" onclick="pinKey('7')">7<span class="pin-key-sub">PQRS</span></button>
    <button class="pin-key" onclick="pinKey('8')">8<span class="pin-key-sub">TUV</span></button>
    <button class="pin-key" onclick="pinKey('9')">9<span class="pin-key-sub">WXYZ</span></button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-loading" id="pin-loading">Verificando...</div>
  <div class="pin-worker-info" id="pin-info">Habla con tu gerente si olvidaste tu PIN</div>
</div>

<script>
var pinVal = ''
var currentWorker = null

function pinKey(n) {
  if (pinVal.length >= 4) return
  pinVal += n
  updateDots()
  clearPinError()
  if (pinVal.length === 4) verifyPIN()
}

function pinDel() {
  pinVal = pinVal.slice(0, -1)
  updateDots()
  clearPinError()
}

function updateDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinVal.length)
  }
}

function clearPinError() {
  document.getElementById('pin-error').textContent = ''
}

function showPinError(msg) {
  const el = document.getElementById('pin-error')
  el.textContent = msg
  const dots = document.getElementById('pin-dots')
  dots.classList.add('pin-shake')
  setTimeout(() => dots.classList.remove('pin-shake'), 400)
  pinVal = ''
  updateDots()
}

async function verifyPIN() {
  document.getElementById('pin-loading').style.display = 'block'
  document.getElementById('pin-error').textContent = ''
  try {
    const res = await fetch('/api/workers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login_pin', pin: pinVal })
    })
    const worker = await res.json()
    document.getElementById('pin-loading').style.display = 'none'

    if (!res.ok || worker.error) {
      showPinError('PIN incorrecto. Intenta de nuevo.')
      return
    }

    // Success — store worker and hide login
    currentWorker = worker
    sessionStorage.setItem('nomi_worker', JSON.stringify(worker))
    onLoginSuccess(worker)
  } catch(e) {
    document.getElementById('pin-loading').style.display = 'none'
    showPinError('Error de conexión. Intenta de nuevo.')
  }
}

function onLoginSuccess(worker) {
  const screen = document.getElementById('pin-screen')
  screen.style.transition = 'opacity .3s'
  screen.style.opacity = '0'
  setTimeout(() => {
    screen.style.display = 'none'
    // Update worker info in the app if functions exist
    if (typeof onWorkerLoggedIn === 'function') onWorkerLoggedIn(worker)
  }, 300)
}

// Check if already logged in this session
(function() {
  const saved = sessionStorage.getItem('nomi_worker')
  if (saved) {
    try {
      currentWorker = JSON.parse(saved)
      document.getElementById('pin-screen').style.display = 'none'
      if (typeof onWorkerLoggedIn === 'function') onWorkerLoggedIn(currentWorker)
    } catch(e) {
      sessionStorage.removeItem('nomi_worker')
    }
  }
})()
</script>


<script>
function onWorkerLoggedIn(worker) {
  // Kitchen is unlocked - just hide the pin screen
  // Optionally show worker name in header
  console.log('Cocina unlocked by:', worker.name)
  window.currentWorker = worker
}
function logoutWorker() {
  sessionStorage.removeItem('nomi_worker')
  document.getElementById('pin-screen').style.display = 'flex'
  document.getElementById('pin-screen').style.opacity = '1'
  pinVal = ''
  updateDots()
  clearPinError()
}
</script>

<div class="hdr">
  <div class="brand">
    <span style="font-size:20px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;overflow:hidden;flex-shrink:0" class="logo-emoji">🍕</span>
    <div><div class="title">COCINA — NOMI PIZZA</div><div class="sub">Kitchen Display System</div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="sp">0</div><div class="stat-lbl">Pendientes</div></div>
    <div class="stat"><div class="stat-val" id="sd" style="color:#22c55e">0</div><div class="stat-lbl">Listos hoy</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="sbtn" id="sndbtn" onclick="toggleSound()">🔔 Sonido ON</button>
    <button class="sbtn" onclick="loadOrders()">🔄 Actualizar</button>
    <button class="sbtn" onclick="openKDSUsage()">📤 Marcar uso</button>
    <button class="sbtn" onclick="logoutWorker()">🔒 Salir</button>
    <span style="font-family:'DM Mono',monospace;font-size:22px" id="clk">--:--</span>
  </div>
</div>

<div class="cols">
  <div class="col"><div class="col-hdr"><span class="col-title">Nuevos</span><span class="col-cnt" id="cnn">0</span></div><div class="orders" id="col-n"></div></div>
  <div class="col"><div class="col-hdr"><span class="col-title">Preparando</span><span class="col-cnt" id="cnp">0</span></div><div class="orders" id="col-p"></div></div>
  <div class="col"><div class="col-hdr"><span class="col-title">Casi listos</span><span class="col-cnt" id="cna">0</span></div><div class="orders" id="col-a"></div></div>
  <div class="col"><div class="col-hdr"><span class="col-title">Listos ✓</span><span class="col-cnt" id="cnr">0</span></div><div class="orders" id="col-r"></div></div>
</div>

<div class="ktoast" id="ktoast"></div>

<script>
var snd=true, orders=[], itemDone={}

async function loadOrders(){
  try{
    const all=await(await fetch('/api/orders')).json()||[]
    orders=all.filter(o=>['pending','accepted','preparing','ready'].includes(o.status))
    document.getElementById('sd').textContent=all.filter(o=>o.status==='delivered').length
    render()
  }catch(e){console.error(e)}
}

const mins=c=>Math.floor((Date.now()-new Date(c).getTime())/60000)
const tfmt=m=>m<60?m+'m':Math.floor(m/60)+'h '+(m%60)+'m'
const tcls=m=>m>30?'tmc':m>20?'tmw':'tmok'
const tycls=t=>t==='dine_in'?'td':t==='delivery'?'tde':'tp'
const tylbl=t=>t==='dine_in'?'Mesa':t==='delivery'?'Domicilio':'Para llevar'
const ccls=(o,m)=>o.status==='ready'?'cd':m>30?'cu':o.status==='preparing'&&m>15?'ca':['pending','accepted'].includes(o.status)?'cn':'cp'
const colk=(o,m)=>['pending','accepted'].includes(o.status)?'n':o.status==='ready'?'r':o.status==='preparing'&&m>15?'a':'p'
const nextlbl={pending:'▶ Iniciar',accepted:'▶ Iniciar',preparing:'🍕 Casi listo',ready:'✓ Servido'}
const nextst={pending:'preparing',accepted:'preparing',preparing:'ready',ready:'delivered'}

function mkCard(o){
  const m=mins(o.created_at),key=o.id
  if(!itemDone[key])itemDone[key]={}
  const tbl=o.restaurant_tables?.number?'Mesa '+o.restaurant_tables.number:o.customer_name||tylbl(o.type)
  const el=document.createElement('div')
  el.className='oc '+ccls(o,m)
  el.innerHTML=`
    <div class="och">
      <div><div class="onum">#${String(o.order_number||'').padStart(4,'0')}</div><div class="otbl">${tbl}</div></div>
      <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <span class="oty ${tycls(o.type)}">${tylbl(o.type)}</span>
        <span class="otm ${tcls(m)}">${tfmt(m)}</span>
      </div>
    </div>
    <div class="ois">
      ${(o.order_items||[]).map((item,idx)=>{
        const dk=itemDone[key][idx]||false
        return `<div class="oi${dk?' dk':''}" onclick="togItem('${key}',${idx})">
          <div class="oichk"><span class="oick-i">✓</span></div>
          <div class="oic"><div class="oin"><span class="oiq">${item.quantity}×</span>${item.item_name}</div>${item.notes?`<div class="onte">⚠ ${item.notes}</div>`:''}</div>
        </div>`
      }).join('')}
    </div>
    <div class="oact">
      <button class="obtn oba" onclick="adv('${o.id}','${nextst[o.status]||'delivered'}')">${nextlbl[o.status]||'Avanzar'}</button>
      ${o.status==='ready'?`<button class="obtn obb" onclick="bump('${o.id}')">Remover</button>`:''}
    </div>`
  return el
}

function render(){
  const cols={n:document.getElementById('col-n'),p:document.getElementById('col-p'),a:document.getElementById('col-a'),r:document.getElementById('col-r')}
  const cnt={n:0,p:0,a:0,r:0}
  Object.values(cols).forEach(c=>c.innerHTML='')
  orders.forEach(o=>{const m=mins(o.created_at),k=colk(o,m);cols[k].appendChild(mkCard(o));cnt[k]++})
  document.getElementById('cnn').textContent=cnt.n
  document.getElementById('cnp').textContent=cnt.p
  document.getElementById('cna').textContent=cnt.a
  document.getElementById('cnr').textContent=cnt.r
  document.getElementById('sp').textContent=orders.length
  Object.values(cols).forEach(c=>{if(!c.children.length)c.innerHTML='<div class="empty-col">Sin pedidos</div>'})
}

function togItem(id,idx){if(!itemDone[id])itemDone[id]={};itemDone[id][idx]=!itemDone[id][idx];render()}

async function adv(id,status){
  try{
    await fetch('/api/orders',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status})})
    const lbl={preparing:'¡Preparando!',ready:'✓ LISTO — Avisar al mesero',delivered:'Servido'}
    ktoast(lbl[status]||'Actualizado')
    if(snd&&status==='ready')beep()
    await loadOrders()
  }catch(e){console.error(e)}
}

function bump(id){orders=orders.filter(o=>o.id!==id);render()}

function beep(){
  try{
    const ctx=new AudioContext(),osc=ctx.createOscillator(),g=ctx.createGain()
    osc.connect(g);g.connect(ctx.destination);osc.frequency.value=880;g.gain.value=0.3
    osc.start();osc.stop(ctx.currentTime+0.15)
    setTimeout(()=>{const o2=ctx.createOscillator();o2.connect(g);o2.frequency.value=1100;o2.start(ctx.currentTime);o2.stop(ctx.currentTime+0.15)},200)
  }catch(e){}
}

function toggleSound(){snd=!snd;document.getElementById('sndbtn').textContent=snd?'🔔 Sonido ON':'🔕 Sonido OFF'}

var ktt
function ktoast(msg){const t=document.getElementById('ktoast');t.textContent=msg;t.classList.add('show');clearTimeout(ktt);ktt=setTimeout(()=>t.classList.remove('show'),2500)}
function updClk(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}

setInterval(loadOrders,15000)
setInterval(updClk,1000)
loadOrders();updClk()
</script>

<script>
// NOMI LOGO LOADER — loads restaurant logo from settings API
(async function applyRestaurantLogo() {
  try {
    let logo = localStorage.getItem('nomi_logo')
    if (!logo) {
      const res = await fetch('/api/settings')
      const settings = await res.json()
      logo = settings.logo_base64 || settings.logo_url
      if (logo) localStorage.setItem('nomi_logo', logo)
    }
    if (!logo) return
    // Find logo containers and replace emoji with image
    const targets = document.querySelectorAll('.logo-emoji, .app-logo, .kds-logo, [data-logo]')
    targets.forEach(el => {
      el.innerHTML = ''
      el.style.overflow = 'hidden'
      el.style.padding = '0'
      el.style.background = 'transparent'
      const img = document.createElement('img')
      img.src = logo
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:inherit'
      img.onerror = () => { el.textContent = '🍕' }
      el.appendChild(img)
    })
  } catch(e) {}
})()
</script>

    </div>
    <button onclick="saveKDSUsage()" style="width:100%;padding:12px;background:#C8392B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Registrar uso</button>
  </div>
</div>

<script>
async function openKDSUsage() {
  const modal = document.getElementById('kds-usage-modal')
  modal.style.display = 'flex'
  try {
    const res = await fetch('/api/inventory')
    const items = await res.json() || []
    const sel = document.getElementById('kds-usage-ing')
    sel.innerHTML = items.map(i =>
      '<option value="' + i.id + '" data-unit="' + i.unit + '">' + i.name + ' (' + i.quantity + ' ' + i.unit + ')</option>'
    ).join('')
    sel.onchange = function() {
      const opt = sel.options[sel.selectedIndex]
      document.getElementById('kds-usage-unit').textContent = opt.getAttribute('data-unit') || ''
    }
    if(items.length) sel.dispatchEvent(new Event('change'))
  } catch(e) { console.error(e) }
}

async function saveKDSUsage() {
  const id = document.getElementById('kds-usage-ing').value
  const qty = Number(document.getElementById('kds-usage-qty').value)
  const reason = document.getElementById('kds-usage-reason').value
  if (!id || !qty) { ktoast('Selecciona ingrediente y cantidad'); return }
  try {
    await fetch('/api/inventory', {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id, quantity:qty, type:'waste', notes: reason})
    })
    ktoast('Uso registrado correctamente')
    document.getElementById('kds-usage-modal').style.display = 'none'
    document.getElementById('kds-usage-qty').value = ''
  } catch(e) { ktoast('Error: ' + e.message) }
}
</script>

</body>
</html>
